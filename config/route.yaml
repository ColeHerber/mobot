# April 10, 2026 Mobot Course — Wean Hall walkway, START → FINISH (Wean Hall Patio)
#
# Course type: PURE SLALOM — 14 gates, no judge-announced left/right intersections.
# The robot follows the white line through all gates; no route.yaml direction changes needed.
#
# Gate layout derived from MobotFinalCourse26.pdf.
# NOTE: Actual gate x-positions are announced 48 hours before race.
#       Update x values below once official positions are confirmed.
#
# Coordinate system:
#   Origin (0, 0) = robot start position
#   +x = forward (direction of travel, toward Wean Hall Patio)
#   +y = left (toward Doherty)
#   All distances in meters
#
# Course landmarks:
#   ~10 m : 28" DROP (raised bridge section — robot passes under)
#   ~33 m : 46" DROP (second raised bridge section)
#   ~50 m : FINISH at Wean Hall Patio
#
# Gate trigger radius: robot enters GATE_APPROACH within radius_m of gate center.
# Slow to gate_ms speed and ensure the line is tracked through the opening.

gates:
  - id: 1
    x: 3.5          # meters from start — ESTIMATE, update when official positions released
    y: -0.8         # right of centerline
    radius_m: 1.0

  - id: 2
    x: 7.5
    y: 0.8          # left of centerline
    radius_m: 1.0

