# April 10, 2026 Mobot Course — Wean Hall walkway, START → FINISH (Wean Hall Patio)
#
# Course sections:
#   Gates 1–8  : sinusoidal slalom (line-following)
#   Gate 8     : large lateral excursion after 46" DROP
#   Gates 9–14 : circles section — judge-announced direction (see intersections below)
#   FINISH     : Wean Hall Patio, ~50 m from start
#
# Coordinate system:
#   Origin (0, 0) = robot start position
#   +x = forward (toward Wean Hall Patio)
#   +y = left (toward Doherty / The Mall)
#   All distances in meters
#
# Gate positions are estimated from satellite image (20 ft scale bar).
# Confirm with official positions announced 48 hrs before race.
#
# Gate type:
#   (default) — GATE_APPROACH: slow to gate_ms, keep line-following through
#   chord     — CHORD: ignore line, steer heading to (x,y) via IMU, resume at arrival_radius_m
#
# ── RACE MORNING ─────────────────────────────────────────────────────────────
# 1. Get circles direction from judges
# 2. Open http://mobot.local:5000/route
# 3. Toggle LEFT / RIGHT for "circles" intersection
# 4. SAVE ROUTE — done (<30 seconds)
# ─────────────────────────────────────────────────────────────────────────────

# DROP landmarks — used for odometry correction.
# The robot enters DROP_WATCH when odo.x is within watch_radius_m of landmark x.
# It monitors pitch (rotation around x-axis). When pitch exceeds entry_pitch_deg
# (on ramp) then drops back below level_pitch_deg (leveled out), x is snapped to
# the landmark's x coordinate and y is reset to 0.
# x should be the position at the BASE of the ramp (where robot levels out).
# Tune entry_pitch_deg and level_pitch_deg on the actual course.
drop_landmarks:
  - id: drop_28in
    x: 11.5           # base of 28" ramp — confirm on course
    watch_radius_m: 2.5
    entry_pitch_deg: 6.0
    level_pitch_deg: 3.0

  - id: drop_46in
    x: 35.0           # base of 46" ramp — confirm on course
    watch_radius_m: 2.5
    entry_pitch_deg: 6.0
    level_pitch_deg: 3.0

intersections:
  - id: circles
    x: 38.5         # entry of circles section, just past 46" DROP
    y: 0.0
    direction: left  # RACE MORNING: update to judge-announced direction
    radius_m: 1.5

gates:
  # ── Slalom section (gates 1–8) ───────────────────────────────────────────
  - id: 1
    x: 3.5
    y: -0.7          # right of centerline
    radius_m: 1.0

  - id: 2
    x: 8.0
    y: 0.7           # left of centerline
    radius_m: 1.0

  # 28" DROP elevated section at ~10 m — no gate

  - id: 3
    x: 13.5
    y: -0.7
    radius_m: 1.0

  - id: 4
    x: 18.0
    y: -0.7
    radius_m: 1.0

  - id: 5
    x: 22.5
    y: 0.7
    radius_m: 1.0

  - id: 6
    x: 27.0
    y: -0.7
    radius_m: 1.0

  - id: 7
    x: 31.0
    y: 0.7
    radius_m: 1.0

  # 46" DROP elevated section at ~33 m — no gate

  - id: 8
    x: 37.0
    y: -1.1          # large lateral excursion visible in course map
    radius_m: 1.2

  # ── Circles section (gates 9–14) ─────────────────────────────────────────
  # These are still regular gates (GATE_APPROACH slows robot).
  # Direction through each circle is controlled by the "circles" intersection above.

  - id: 9
    x: 40.5
    y: 0.6
    radius_m: 0.9

  - id: 10
    x: 42.5
    y: 0.6
    radius_m: 0.9

  - id: 11
    x: 44.0
    y: -0.6
    radius_m: 0.9

  - id: 12
    x: 46.0
    y: 0.6
    radius_m: 0.9

  - id: 13
    x: 48.0
    y: 0.6
    radius_m: 0.9

  - id: 14
    x: 49.5
    y: 0.0           # final gate, approaching FINISH on centerline
    radius_m: 1.0
