# Mobot control parameters
# Edit and restart to tune. All values are in SI units (m, s, rad) unless noted.

pid:
  kp: 1.2          # proportional gain on line position error
  kd: 0.08         # derivative gain (on measurement, not error)
  speed_kp: 0.5    # speed reduction factor: throttle -= speed_kp * |line_pos| * base

speed:
  base_ms: 0.6     # nominal forward speed (m/s) — increase after straight-line test
  gate_ms: 0.3     # speed near gates / dead-reckoning / intersection (m/s)
  min_ms:  0.2     # minimum speed floor (m/s)

servo:
  gpio_pin: 18     # Pi GPIO (BCM numbering) — hardware PWM0
  gpiochip: 4      # lgpio chip handle: 4 for Pi 5 (RP1), 0 for Pi 4
  min_pw:   1000   # µs — full left lock (tune against TT-02R steering geometry)
  max_pw:   2000   # µs — full right lock
  center_pw: 1500  # µs — straight ahead (nominal mechanical center)
  center_offset_us: 0  # µs — fine trim offset (use tune_servo_center.py to adjust)

vesc:
  wheel_circumference_m: 0.204   # ~65mm diameter tire (TT-02R stock)
  gear_ratio: 8.0                # motor rotations per wheel rotation

sensor:
  low_confidence_threshold: 30   # below this → DEAD_RECKON state (0–255 scale)
  port: /dev/ttyACM0             # Teensy USB serial device
  baud: 115200

imu:
  i2c_address: 0x4A              # BNO085 default I2C address (AD0 low)
