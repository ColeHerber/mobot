# Mobot control parameters
# Edit and restart to tune. All values are in SI units (m, s, rad) unless noted.

pid:
  kp: 1        # proportional gain on line position error
  kd: 0.08         # derivative gain (on measurement, not error)
  speed_kp: 0.5    # speed reduction factor: throttle -= speed_kp * |line_pos| * base

speed:
  base_ms: 0.01     # nominal forward speed (m/s) — increase after straight-line test
  gate_ms: 0.01     # speed near gates / dead-reckoning / intersection (m/s)
  min_ms:  0.005     # minimum speed floor (m/s)

servo:
  gpio_pin: 12          # Pi GPIO (BCM numbering) — physical pin 32, hardware PWM0
  pwmchip: 0            # /sys/class/pwm/pwmchip<N> — Pi 5 with dtoverlay=pwm,pin=12,func=4
  pwm_channel: 0        # pwm0
  min_pw:   1350        # µs — full left lock (tune against TT-02R steering geometry)
  max_pw:   1850        # µs — full right lock
  center_pw: 1550       # µs — straight ahead (nominal mechanical center)
  center_offset_us: 0   # µs — fine trim offset (use tune_servo_center.py to adjust)

vesc:
  port: /dev/serial/by-id/usb-STMicroelectronics_ChibiOS_RT_Virtual_COM_Port_304-if00       # VESC USB serial device (ttyACM0 is Teensy)
  baud: 115200
  wheel_circumference_m: 0.26   # ~65mm diameter tire (TT-02R stock)
  gear_ratio: 8.0                # motor rotations per wheel rotation
  max_duty: 0.25                 # hard duty-cycle cap (0.0–1.0); 0.25 = 25%

sensor:
  low_confidence_threshold: 30   # below this → DEAD_RECKON state (0–255 scale)
  port: /dev/serial/by-id/usb-Teensyduino_USB_Serial_14421340-if00             # Teensy USB serial device
  baud: 115200

imu:
  i2c_address: 0x4A              # BNO085 default I2C address (AD0 low)
