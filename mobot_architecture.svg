<svg width="100%" viewBox="0 0 680 660" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,sans-serif">
<defs>
<style>
  .th { font-size:14px; font-weight:500; fill:#1a1a1a; }
  .ts { font-size:12px; fill:#555; }
  .arr { stroke:#888; stroke-width:1.2; fill:none; }
  .box-teal  { fill:#E1F5EE; stroke:#0F6E56; stroke-width:0.6; }
  .box-blue  { fill:#E6F1FB; stroke:#185FA5; stroke-width:0.6; }
  .box-purple{ fill:#EEEDFE; stroke:#534AB7; stroke-width:0.6; }
  .box-coral { fill:#FAECE7; stroke:#993C1D; stroke-width:0.6; }
  .box-gray  { fill:#F1EFE8; stroke:#5F5E5A; stroke-width:0.6; }
  .lbl-teal  { fill:#085041; }
  .lbl-blue  { fill:#0C447C; }
  .lbl-purple{ fill:#3C3489; }
  .lbl-coral { fill:#712B13; }
  .lbl-gray  { fill:#444441; }
  .sub-teal  { fill:#0F6E56; }
  .sub-blue  { fill:#185FA5; }
  .sub-purple{ fill:#534AB7; }
  .sub-coral { fill:#993C1D; }
  .sub-gray  { fill:#5F5E5A; }
</style>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
  <path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<!-- Section labels -->
<text class="ts" x="100" y="50" text-anchor="middle" font-weight="500">sensor stack</text>
<text class="ts" x="570" y="378" text-anchor="middle" font-weight="500">actuator stack</text>

<!-- QTRX-MD-16A -->
<rect x="40" y="65" width="120" height="48" rx="8" class="box-teal"/>
<text class="th lbl-teal" x="100" y="80" text-anchor="middle" dominant-baseline="central">QTRX-MD-16A</text>
<text class="ts sub-teal" x="100" y="98" text-anchor="middle" dominant-baseline="central">16ch analog</text>

<!-- QTRX → Teensy -->
<line x1="100" y1="113" x2="100" y2="143" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="108" y="128" dominant-baseline="central">analog</text>

<!-- Teensy 4.x -->
<rect x="40" y="143" width="120" height="48" rx="8" class="box-blue"/>
<text class="th lbl-blue" x="100" y="158" text-anchor="middle" dominant-baseline="central">Teensy 4.x</text>
<text class="ts sub-blue" x="100" y="176" text-anchor="middle" dominant-baseline="central">C++ sensor loop</text>

<!-- BNO085 -->
<rect x="40" y="221" width="120" height="48" rx="8" class="box-teal"/>
<text class="th lbl-teal" x="100" y="236" text-anchor="middle" dominant-baseline="central">BNO085 IMU</text>
<text class="ts sub-teal" x="100" y="254" text-anchor="middle" dominant-baseline="central">onboard fusion</text>

<!-- Teensy → Pi -->
<line x1="160" y1="167" x2="175" y2="167" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="167" y="157" text-anchor="middle" dominant-baseline="central">USB</text>

<!-- BNO085 → Pi -->
<line x1="160" y1="245" x2="175" y2="245" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="167" y="235" text-anchor="middle" dominant-baseline="central">I2C</text>

<!-- Pi container (dashed) -->
<rect x="175" y="35" width="295" height="455" rx="16" fill="#FAFAF8" stroke="#B4B2A9" stroke-width="1" stroke-dasharray="6 4"/>
<text x="322" y="60" text-anchor="middle" dominant-baseline="central" font-family="system-ui,sans-serif" font-size="14" font-weight="500" fill="#3C3489">Raspberry Pi 4</text>

<!-- sensor reader -->
<rect x="190" y="80" width="265" height="48" rx="8" class="box-purple"/>
<text class="th lbl-purple" x="322" y="95" text-anchor="middle" dominant-baseline="central">sensor reader</text>
<text class="ts sub-purple" x="322" y="113" text-anchor="middle" dominant-baseline="central">USB serial + I2C ingestion</text>

<!-- odometry -->
<rect x="190" y="158" width="265" height="48" rx="8" class="box-purple"/>
<text class="th lbl-purple" x="322" y="173" text-anchor="middle" dominant-baseline="central">odometry</text>
<text class="ts sub-purple" x="322" y="191" text-anchor="middle" dominant-baseline="central">unicycle WIO, encoder + heading</text>

<!-- PID controller -->
<rect x="190" y="236" width="265" height="48" rx="8" class="box-purple"/>
<text class="th lbl-purple" x="322" y="251" text-anchor="middle" dominant-baseline="central">PID controller</text>
<text class="ts sub-purple" x="322" y="269" text-anchor="middle" dominant-baseline="central">line following + speed control</text>

<!-- state machine -->
<rect x="190" y="314" width="265" height="48" rx="8" class="box-purple"/>
<text class="th lbl-purple" x="322" y="329" text-anchor="middle" dominant-baseline="central">state machine</text>
<text class="ts sub-purple" x="322" y="347" text-anchor="middle" dominant-baseline="central">follow · gate · reckon · reacquire</text>

<!-- actuator output -->
<rect x="190" y="392" width="265" height="48" rx="8" class="box-purple"/>
<text class="th lbl-purple" x="322" y="407" text-anchor="middle" dominant-baseline="central">actuator output</text>
<text class="ts sub-purple" x="322" y="425" text-anchor="middle" dominant-baseline="central">servo PWM · VESC throttle</text>

<!-- Internal arrows -->
<line x1="322" y1="128" x2="322" y2="156" class="arr" marker-end="url(#arrow)"/>
<line x1="322" y1="206" x2="322" y2="234" class="arr" marker-end="url(#arrow)"/>
<line x1="322" y1="284" x2="322" y2="312" class="arr" marker-end="url(#arrow)"/>
<line x1="322" y1="362" x2="322" y2="390" class="arr" marker-end="url(#arrow)"/>

<!-- GoBILDA servo -->
<rect x="505" y="392" width="130" height="48" rx="8" class="box-coral"/>
<text class="th lbl-coral" x="570" y="407" text-anchor="middle" dominant-baseline="central">GoBILDA servo</text>
<text class="ts sub-coral" x="570" y="425" text-anchor="middle" dominant-baseline="central">Pi GPIO PWM</text>

<!-- VESC 6.7 -->
<rect x="505" y="460" width="130" height="48" rx="8" class="box-coral"/>
<text class="th lbl-coral" x="570" y="475" text-anchor="middle" dominant-baseline="central">VESC 6.7 Pro</text>
<text class="ts sub-coral" x="570" y="493" text-anchor="middle" dominant-baseline="central">motor + encoder</text>

<!-- Motor -->
<rect x="505" y="528" width="130" height="48" rx="8" class="box-gray"/>
<text class="th lbl-gray" x="570" y="543" text-anchor="middle" dominant-baseline="central">TT-02R motor</text>
<text class="ts sub-gray" x="570" y="561" text-anchor="middle" dominant-baseline="central">4WD brushless</text>

<!-- Pi → GoBILDA (PWM) -->
<line x1="470" y1="416" x2="505" y2="416" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="487" y="407" text-anchor="middle" dominant-baseline="central">PWM</text>

<!-- Pi → VESC (throttle) -->
<path d="M 470 434 L 491 434 L 491 482 L 505 482" class="arr" marker-end="url(#arrow)"/>
<!-- VESC → Pi (encoder) -->
<path d="M 505 490 L 491 490 L 491 442 L 470 442" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="491" y="462" text-anchor="middle" dominant-baseline="central">UART</text>

<!-- VESC → Motor (3-phase) -->
<line x1="570" y1="508" x2="570" y2="528" class="arr" marker-end="url(#arrow)"/>
<text class="ts" x="578" y="518" dominant-baseline="central">3-phase</text>

<!-- Motor → VESC (encoder) -->
<line x1="561" y1="528" x2="561" y2="510" class="arr" marker-end="url(#arrow)"/>

<!-- Power note -->
<text class="ts" x="322" y="596" text-anchor="middle" fill="#888">power: LiPo → VESC BEC (5V) → Pi 4 + Teensy</text>

<!-- Legend -->
<rect x="48" y="618" width="12" height="12" rx="2" fill="#1D9E75"/>
<text class="ts" x="66" y="624" dominant-baseline="central">sensor hw</text>

<rect x="175" y="618" width="12" height="12" rx="2" fill="#378ADD"/>
<text class="ts" x="193" y="624" dominant-baseline="central">μcontroller</text>

<rect x="302" y="618" width="12" height="12" rx="2" fill="#7F77DD"/>
<text class="ts" x="320" y="624" dominant-baseline="central">Pi software</text>

<rect x="428" y="618" width="12" height="12" rx="2" fill="#D85A30"/>
<text class="ts" x="446" y="624" dominant-baseline="central">actuator</text>

<rect x="546" y="618" width="12" height="12" rx="2" fill="#888780"/>
<text class="ts" x="564" y="624" dominant-baseline="central">mechanical</text>
</svg>
